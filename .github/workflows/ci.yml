name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python tier (common + supervisor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e libs/common -e "services/supervisor[dev]"

      - name: Lint
        run: ruff check libs services

      - name: Type check
        run: mypy libs/common/medidata_common services/supervisor/supervisor

      - name: Test
        env:
          KAFKA_MODE: memory
          MODEL_GATEWAY_MODE: fake
          CHECKPOINTER_MODE: memory
        run: pytest -q
