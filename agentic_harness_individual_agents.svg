.ar{stroke:#6b7785;stroke-width:1.5;fill:none;marker-end:url(#a);}
.ard{stroke:#6b7785;stroke-width:1.3;fill:none;marker-end:url(#a);stroke-dasharray:4 3;}
.lp{stroke:#f59e0b;stroke-width:2;fill:none;marker-end:url(#al);}
