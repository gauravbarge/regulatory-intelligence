<svg viewBox="0 0 1320 742" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc">
<title id="ttl">Agentic Harness - individual agents (Path B, LangGraph)</title>
<desc id="desc">The four sub-agents are expanded into individual agents. A shared supervisor band dispatches sub-tasks to each agent. Every agent is its own compiled LangGraph graph running an internal Reason-Act-Observe loop and calling its own dedicated MCP tool. .NET owns transport; Kafka is the runtime boundary; MongoDB, Qdrant and S3 are shared memory and state.</desc>
