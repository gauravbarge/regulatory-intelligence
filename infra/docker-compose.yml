# Local development stack for the Regulatory Intelligence Platform.
#
#   docker compose -f infra/docker-compose.yml up -d
#   docker compose -f infra/docker-compose.yml --profile agents up -d   # include agent services
#
# Infrastructure (kafka, mongo, qdrant, minio) always starts.
# Python agent services are in the "agents" profile so you can run them
# from your IDE/virtualenv instead during active development.

x-env-common: &env-common
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_MODE: aiokafka
  MONGODB_URI: mongodb://mongodb:27017
  MONGODB_DB: regintel
  QDRANT_URL: http://qdrant:6333
  S3_ENDPOINT_URL: http://minio:9000
  S3_BUCKET: regintel-artifacts
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_REGION: us-east-1
  MODEL_GATEWAY_MODE: ${MODEL_GATEWAY_MODE:-fake}
  CHECKPOINTER_MODE: ${CHECKPOINTER_MODE:-mongodb}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_JSON: ${LOG_JSON:-false}
  APP_ENV: ${APP_ENV:-local}
  COMPLIANCE_CONFIDENCE_THRESHOLD: ${COMPLIANCE_CONFIDENCE_THRESHOLD:-0.8}
  BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-5-sonnet-20241022-v2:0}
  LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}

x-restart: &restart
  restart: unless-stopped

x-agent-defaults: &agent-defaults
  build:
    context: ..
    dockerfile: services/${SERVICE_NAME}/Dockerfile
  environment:
    <<: *env-common
    KAFKA_CONSUMER_GROUP: agents
  depends_on:
    kafka:
      condition: service_healthy
    mongodb:
      condition: service_healthy
  <<: *restart
  profiles: [agents]

services:
  # -----------------------------------------------------------------------
  # Infrastructure
  # -----------------------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
      - "9094:9094"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    <<: *restart

  kafka-init:
    image: bitnami/kafka:3.7
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "for topic in task.request agent.dispatch agent.result ui.inbound.response tool.call.event dead.letter audit.event; do
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic $$topic --partitions 3 --replication-factor 1
        echo \"Topic $$topic ready\"
      done"
    restart: on-failure

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: regintel
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    <<: *restart

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    <<: *restart

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    <<: *restart

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "mc alias set local http://minio:9000 minioadmin minioadmin &&
       mc mb --ignore-existing local/regintel-artifacts &&
       mc anonymous set download local/regintel-artifacts &&
       echo 'MinIO bucket ready'"
    restart: on-failure

  # -----------------------------------------------------------------------
  # Python Agent Services  (profile: agents)
  # -----------------------------------------------------------------------
  supervisor:
    build:
      context: ..
      dockerfile: services/supervisor/Dockerfile
    image: regintel/supervisor:local
    environment:
      <<: *env-common
      KAFKA_CONSUMER_GROUP: supervisor
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    <<: *restart
    profiles: [agents]

  research-agent:
    build:
      context: ..
      dockerfile: services/research_agent/Dockerfile
    image: regintel/research-agent:local
    environment:
      <<: *env-common
      KAFKA_CONSUMER_GROUP: agents
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    depends_on:
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    <<: *restart
    profiles: [agents]

  developer-agent:
    build:
      context: ..
      dockerfile: services/developer_agent/Dockerfile
    image: regintel/developer-agent:local
    environment:
      <<: *env-common
      KAFKA_CONSUMER_GROUP: agents
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    <<: *restart
    profiles: [agents]

  agile-master-agent:
    build:
      context: ..
      dockerfile: services/agile_master_agent/Dockerfile
    image: regintel/agile-master-agent:local
    environment:
      <<: *env-common
      KAFKA_CONSUMER_GROUP: agents
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_USER: ${JIRA_USER:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    <<: *restart
    profiles: [agents]

  document-analyst:
    build:
      context: ..
      dockerfile: services/document_analyst/Dockerfile
    image: regintel/document-analyst:local
    environment:
      <<: *env-common
      KAFKA_CONSUMER_GROUP: agents
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    <<: *restart
    profiles: [agents]

  ingestion:
    build:
      context: ..
      dockerfile: services/ingestion/Dockerfile
    image: regintel/ingestion:local
    environment:
      <<: *env-common
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      INGESTION_WATCH_PREFIX: ${INGESTION_WATCH_PREFIX:-uploads/}
    depends_on:
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    <<: *restart
    profiles: [agents]

volumes:
  kafka-data:
  mongo-data:
  qdrant-data:
  minio-data:
