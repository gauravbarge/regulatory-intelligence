---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-agent
  namespace: regintel
  labels:
    app: research-agent
    app.kubernetes.io/component: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: research-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: research-agent
    spec:
      serviceAccountName: regintel-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      terminationGracePeriodSeconds: 60
      containers:
        - name: research-agent
          image: ghcr.io/gauravbarge/regulatory-intelligence/research-agent:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: regintel-config
            - secretRef:
                name: regintel-secrets
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            exec:
              command: ["python", "-c", "import research_agent; print('ok')"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "-c", "import research_agent; print('ok')"]
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: research-agent-hpa
  namespace: regintel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: research-agent
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
