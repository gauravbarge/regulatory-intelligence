---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: developer-agent
  namespace: regintel
  labels:
    app: developer-agent
    app.kubernetes.io/component: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: developer-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: developer-agent
    spec:
      serviceAccountName: regintel-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      terminationGracePeriodSeconds: 60
      containers:
        - name: developer-agent
          image: ghcr.io/gauravbarge/regulatory-intelligence/developer-agent:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: regintel-config
            - secretRef:
                name: regintel-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["python", "-c", "import developer_agent; print('ok')"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "-c", "import developer_agent; print('ok')"]
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: developer-agent-hpa
  namespace: regintel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: developer-agent
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
