# Secret VALUES are placeholders — replace before applying.
# In production use External Secrets Operator, AWS Secrets Manager,
# or Vault Agent Injector rather than committing real values.
#
# To create from environment:
#   kubectl create secret generic regintel-secrets -n regintel \
#     --from-literal=MONGODB_URI="mongodb://..." \
#     --from-literal=QDRANT_API_KEY="..." \
#     --from-literal=AWS_ACCESS_KEY_ID="..." \
#     --from-literal=AWS_SECRET_ACCESS_KEY="..." \
#     --from-literal=GITHUB_TOKEN="..." \
#     --from-literal=JIRA_BASE_URL="https://your-org.atlassian.net" \
#     --from-literal=JIRA_USER="user@example.com" \
#     --from-literal=JIRA_API_TOKEN="..." \
#     --from-literal=LANGSMITH_API_KEY="..."
apiVersion: v1
kind: Secret
metadata:
  name: regintel-secrets
  namespace: regintel
type: Opaque
stringData:
  MONGODB_URI: "mongodb://mongodb-headless.regintel.svc.cluster.local:27017"
  QDRANT_API_KEY: ""
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  S3_ENDPOINT_URL: ""
  GITHUB_TOKEN: ""
  JIRA_BASE_URL: ""
  JIRA_USER: ""
  JIRA_API_TOKEN: ""
  LANGSMITH_API_KEY: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
